<!DOCTYPE html>
<html>
<head>
<title>Promo Codes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<h2>Promo Code Management</h2>

<form class="mb-4">

<input type="text" class="form-control mb-2" placeholder="Promo Code">

<button class="btn btn-primary">
Create Promo
</button>

</form>

<table class="table table-bordered">

<tr>
<th>Promo Code</th>
<th>Discount</th>
<th>Status</th>
</tr>

<tr>
<td>SAVE20</td>
<td>20%</td>
<td>Active</td>
</tr>

<tr>
<td>FIRST50</td>
<td>50%</td>
<td>Active</td>
</tr>

</table>

</div>

</body>
</html>
