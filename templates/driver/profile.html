<!DOCTYPE html>
<html>
<head>
    <title>Driver Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Driver Profile</h2>

    <form>

        <div class="mb-3">
            <label>Full Name</label>
            <input type="text" class="form-control" value="Rahul Patel">
        </div>

        <div class="mb-3">
            <label>Phone Number</label>
            <input type="text" class="form-control" value="+91 9876543210">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" value="driver@gmail.com">
        </div>

        <div class="mb-3">
            <label>Vehicle Number</label>
            <input type="text" class="form-control" value="GJ10AB1234">
        </div>

        <div class="mb-3">
            <label>Driving License</label>
            <input type="text" class="form-control" value="DL123456789">
        </div>

        <div class="mb-3">
            <label>Change Password</label>
            <input type="password" class="form-control">
        </div>

        <button class="btn btn-primary">
            Update Profile
        </button>

    </form>

</div>

</body>
</html>
